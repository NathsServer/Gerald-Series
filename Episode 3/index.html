<!DOCTYPE html>
<html lang="en">
<head>
<!--
  GERALD — Local AI Agent Interface
  ===================================
  The only thing you need to change is the WEBHOOK_URL constant below.
  Find it at the top of the <script> section.
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gerald">
<title>Gerald</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --surface-2: #1a1a1a;
    --border: #222;
    --accent: #4ade80;
    --accent-dim: rgba(74, 222, 128, 0.12);
    --text: #e8e8e8;
    --text-muted: #555;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
    --sans: -apple-system, 'Helvetica Neue', sans-serif;
    --radius: 6px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    height: 100dvh;
    max-width: 780px;
    margin: 0 auto;
  }

  header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px 13px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  .header-name {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.04em;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    animation: pulse 2.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  .version {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    margin-left: auto;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 20px 12px;
    display: flex;
    flex-direction: column;
    gap: 22px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 88%;
    animation: msgIn 0.2s ease-out;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.gerald { align-self: flex-start; align-items: flex-start; }

  .msg.user .bubble {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14.5px;
    line-height: 1.55;
    padding: 9px 14px;
    border-radius: var(--radius);
    border-bottom-right-radius: 2px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.gerald .bubble {
    background: transparent;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13.5px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
    border-left: 2px solid var(--border);
    padding-left: 14px;
  }

  .msg.gerald.error .bubble {
    border-left-color: #f87171;
    color: #f87171;
  }

  .thinking {
    display: flex;
    align-items: center;
    gap: 5px;
    padding-left: 16px;
    border-left: 2px solid var(--border);
  }

  .thinking span {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: think 1.2s ease-in-out infinite;
  }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes think {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  #input-area {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  #input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.5;
    padding: 10px 14px;
    resize: none;
    outline: none;
    min-height: 42px;
    max-height: 140px;
    transition: border-color 0.15s;
    appearance: none;
    -webkit-appearance: none;
  }

  #input::placeholder { color: var(--text-muted); }
  #input:focus { border-color: #333; }
  #input:disabled { opacity: 0.4; cursor: not-allowed; }

  #send-btn {
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, background 0.15s;
    color: var(--text-muted);
  }

  #send-btn:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  #send-btn svg { width: 16px; height: 16px; }

  #empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    user-select: none;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="status-dot"></div>
    <span class="header-name">Gerald</span>
    <span class="version">v2.0</span>
  </header>

  <div id="messages">
    <div id="empty">— waiting for input —</div>
  </div>

  <div id="input-area">
    <textarea id="input" rows="1" placeholder="Message Gerald…" autocomplete="off" autocorrect="off" spellcheck="true"></textarea>
    <button id="send-btn" title="Send">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 8L2 2l2.5 6L2 14l12-6z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIGURATION — change this to your webhook endpoint
// ─────────────────────────────────────────────────────────────────────────────
const WEBHOOK_URL = "http://192.168.4.115:5678/webhook/057ecd1d-a83f-439b-b51f-4d6d6e4f1d10";
// ─────────────────────────────────────────────────────────────────────────────

const SESSION_ID = "gerald-ui-" + Date.now();

const messagesEl = document.getElementById("messages");
const inputEl    = document.getElementById("input");
const sendBtn    = document.getElementById("send-btn");
const emptyEl    = document.getElementById("empty");

let isWaiting = false;

const REQUEST_TIMEOUT_MS = 90000;

inputEl.addEventListener("input", () => {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
});

inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener("click", sendMessage);

function hideEmpty() {
  if (emptyEl) emptyEl.style.display = "none";
}

function appendMessage(role, content, isError = false) {
  hideEmpty();
  const msg = document.createElement("div");
  msg.className = "msg " + role + (isError ? " error" : "");
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = content;
  msg.appendChild(bubble);
  messagesEl.appendChild(msg);
  scrollToBottom();
  return msg;
}

function showThinking() {
  hideEmpty();
  const msg = document.createElement("div");
  msg.className = "msg gerald";
  msg.id = "thinking";
  const t = document.createElement("div");
  t.className = "thinking";
  t.innerHTML = "<span></span><span></span><span></span>";
  msg.appendChild(t);
  messagesEl.appendChild(msg);
  scrollToBottom();
}

function hideThinking() {
  const t = document.getElementById("thinking");
  if (t) t.remove();
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function setWaiting(val) {
  isWaiting = val;
  inputEl.disabled = val;
  sendBtn.disabled = val;
}

function findReplyText(payload, depth = 0) {
  if (payload == null || depth > 8) return "";

  if (typeof payload === "string") {
    const text = payload.trim();
    return text;
  }

  if (typeof payload === "number" || typeof payload === "boolean") {
    return String(payload);
  }

  if (Array.isArray(payload)) {
    for (const item of payload) {
      const text = findReplyText(item, depth + 1);
      if (text) return text;
    }
    return "";
  }

  if (typeof payload === "object") {
    const preferredKeys = [
      "output", "response", "text", "answer", "result", "content", "message"
    ];

    for (const key of preferredKeys) {
      if (key in payload) {
        const text = findReplyText(payload[key], depth + 1);
        if (text) return text;
      }
    }

    if (Array.isArray(payload.choices)) {
      const text = findReplyText(payload.choices, depth + 1);
      if (text) return text;
    }

    if (Array.isArray(payload.data)) {
      const text = findReplyText(payload.data, depth + 1);
      if (text) return text;
    }

    for (const value of Object.values(payload)) {
      const text = findReplyText(value, depth + 1);
      if (text) return text;
    }
  }

  return "";
}

async function readWebhookReply(res) {
  const raw = await res.text();
  if (!raw) return "";

  const contentType = (res.headers.get("content-type") || "").toLowerCase();
  const looksLikeJson = contentType.includes("application/json") || /^[\[{]/.test(raw.trim());

  if (looksLikeJson) {
    try {
      const json = JSON.parse(raw);
      return findReplyText(json) || raw;
    } catch {
      return raw;
    }
  }

  return raw;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isWaiting) return;

  inputEl.value = "";
  inputEl.style.height = "auto";

  appendMessage("user", text);
  setWaiting(true);
  showThinking();

  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), REQUEST_TIMEOUT_MS);

  try {
    const res = await fetch(WEBHOOK_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Accept": "application/json, text/plain;q=0.9, */*;q=0.8"
      },
      body: JSON.stringify({ chatInput: text, sessionId: SESSION_ID }),
      signal: controller.signal
    });

    if (!res.ok) {
      const body = await res.text();
      throw new Error("HTTP " + res.status + (body ? " - " + body.slice(0, 240) : ""));
    }

    const output = await readWebhookReply(res);
    appendMessage("gerald", output || "(empty response)");

  } catch (err) {
    let message = "Connection failed. Check webhook URL, n8n status, and CORS.";

    if (err && err.name === "AbortError") {
      message = "Request timed out. The workflow may still be running.";
    } else if (err && err.message) {
      if (err instanceof TypeError && /fetch/i.test(err.message)) {
        message = "Network/CORS error. If this page is opened as a local file, serve it over http://localhost and allow that origin in n8n.";
      } else {
        message = "Request failed: " + err.message;
      }
    }

    appendMessage("gerald", message, true);
  } finally {
    clearTimeout(timeout);
    hideThinking();
    setWaiting(false);
    inputEl.focus();
  }
}

// ── PWA Manifest ──
const iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" fill="#0d0d0d"/><text x="256" y="340" font-family="monospace" font-weight="bold" font-size="300" text-anchor="middle" fill="#4ade80">G</text></svg>`;
const iconUrl = "data:image/svg+xml;base64," + btoa(iconSvg);

const manifest = {
  name: "Gerald", short_name: "Gerald",
  display: "standalone",
  theme_color: "#0d0d0d", background_color: "#0d0d0d",
  start_url: "./",
  icons: [{ src: iconUrl, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }]
};

const manifestBlob = new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" });
const manifestLink = document.createElement("link");
manifestLink.rel = "manifest";
manifestLink.href = URL.createObjectURL(manifestBlob);
document.head.appendChild(manifestLink);

const appleIcon = document.createElement("link");
appleIcon.rel = "apple-touch-icon";
appleIcon.href = iconUrl;
document.head.appendChild(appleIcon);
</script>
</body>
</html>
